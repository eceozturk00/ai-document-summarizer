<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AI Document Summarizer</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; }
      .box { padding: 16px; border: 1px solid #ddd; border-radius: 10px; }
      .error { color: #b00020; margin-top: 10px; }
      textarea { width: 100%; height: 260px; }
      button { padding: 10px 14px; cursor: pointer; }
    </style>
  </head>
  <body>
    <h2>AI Document Summarizer</h2>

    <div class="box">
      <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".pdf,.docx" />
        <button type="submit">Summarize</button>
      </form>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}
    </div>

    <h3>Summary</h3>
    <textarea readonly>{{ summary }}</textarea>
  </body>
</html>
